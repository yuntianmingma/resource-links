name: Daily Link Check & Update

on:
  push:
    branches: [main]
  schedule:
    # Every day at 08:00 UTC (16:00 Beijing time)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --cache /tmp/npm-cache

      - name: Check dead links
        run: npx tsx scripts/check-links.ts

      - name: Fetch RSS new links
        run: npx tsx scripts/fetch-rss.ts

      - name: Commit data changes
        run: |
          if git diff --quiet src/data/links.json; then
            echo "No changes to commit."
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add src/data/links.json
            git commit -m "Auto: link check & RSS update $(date +%Y-%m-%d)"
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
