<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Store the intended path, then redirect to the SPA entry point
    var base = '/resource-links';
    var path = location.pathname.replace(base, '') || '/';
    sessionStorage.setItem('spa-redirect', path);
    location.replace(base + '/');
  </script>
</head>
<body>Redirecting...</body>
</html>
